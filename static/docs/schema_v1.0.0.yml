              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                UserResponse:
                  value:
                    id: 1
                    username: johndoe
                    email: john@example.com
                    is_active: true
                    is_staff: false
                    is_superuser: false
                    registered_at: '2023-01-15T10:30:00Z'
