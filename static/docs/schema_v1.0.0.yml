openapi: 3.0.3
info:
  title: Django Dashboard API
  version: 1.0.0
  description: API documentation for Django Dashboard application
paths:
  /api/user/app/users/:
    post:
      operationId: api_user_app_users_create
      description: 새로운 사용자를 생성합니다.
      summary: 새 사용자 생성
      tags:
      - app-user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
            examples:
              ValidUserCreation:
                value:
                  username: johndoe
                  email: john@example.com
                  password: secure_password123
                summary: 유효한 사용자 생성 예제
                description: 새 사용자를 생성하는 유효한 요청 예제
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                UserResponse:
                  value:
                    id: 1
                    username: johndoe
                    email: john@example.com
                    is_active: true
                    is_staff: false
                    is_superuser: false
                    registered_at: '2023-01-15T10:30:00Z'
                    deactivated_at: null
                  summary: 사용자 응답 예제
                  description: 사용자 조회/생성 시 반환되는 응답 예제
          description: ''
    get:
      operationId: api_user_app_users_list
      description: 모든 사용자 목록을 조회합니다. 페이지네이션이 적용됩니다.
      summary: 사용자 목록 조회
      tags:
      - app-user
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserList'
          description: ''
  /api/user/app/users/stats/:
    get:
      operationId: api_user_app_users_stats_retrieve
      description: 사용자 관련 통계 정보를 조회합니다.
      summary: 사용자 통계
      tags:
      - app-user
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: 통계 조회 성공
                examples:
                  application/json:
                    total_users: 100
                    active_users: 85
                    inactive_users: 15
                    staff_users: 5
                    superuser_count: 1
          description: ''
