[tool.black]
line-length = 200

[tool.isort]
profile = "black"
line_length = 200
force_sort_within_sections = true
sections = "FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER"
known_django = ["django"]
skip = ["__init__.py", "migrations", "settings.py", "wsgi.py", "asgi.py", "venv", "env"]

# ─── Commitizen ──────────────────────────────────────────
[tool.commitizen]
name = "cz_conventional_commits"
version = "1.0.0"
tag_format = "v$version"
version_files = []
allowed_prefixes = ["Merge", "Revert", "chore", "ci"]
schema = """
<type>(<scope>): <subject>

<type> 목록:
  feat:      새 기능 추가                    → minor 버전 업 (1.1.0)
  fix:       버그 수정                       → patch 버전 업 (1.0.1)
  docs:      문서 변경
  style:     코드 포맷팅 (기능 변경 없음)
  refactor:  리팩토링 (기능 변경 없음)
  perf:      성능 개선                       → patch 버전 업
  test:      테스트 추가/수정
  build:     빌드 시스템/의존성 변경
  ci:        CI 설정 변경
  chore:     기타 잡무

<scope> 예시 (선택):
  migration, auth, api, admin, user, config ...

예시:
  feat(migration): User 모델에 deactivated_at 필드 추가
  fix(auth): 로그인 세션 만료 버그 수정
  docs: API 가이드 업데이트
  chore: .gitignore 정리

대화형 커밋: cz commit
"""

# ─── Python Semantic Release ─────────────────────────────
[tool.semantic_release]
version_variable = []
version_toml = ["pyproject.toml:tool.commitizen.version"]
branch = "main"
upload_to_pypi = false
build_command = false
commit_message = "chore(release): v{version} [skip ci]"
changelog_file = "CHANGELOG.md"

[tool.semantic_release.changelog]
template_dir = false
exclude_commit_patterns = [
    "^chore\\(release\\):",
    "^ci:",
    "^Merge",
]

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "docs", "style", "refactor", "perf", "test", "build", "ci", "chore"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]